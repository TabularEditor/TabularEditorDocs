name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
      - name: Generate redirects
        run: |
          chmod +x gen_redirects.py
          ./gen_redirects.py
      - name: Build English Documentation
        uses: nunit/docfx-action@v4.1.0
        with:
          args: docfx.json --warningsAsErrors
      - name: Replace Shared Xref in API HTML
        run: |
          sudo chmod -R u+w _site/en/api
          sudo find _site/en/api -type f -name "*.html" -exec sed -i 's|<a class="xref" href="TabularEditor.Shared.html">Shared</a>|Shared|g' {} +
        shell: bash
      - name: Prepare Spanish Content (English fallback)
        run: |
          chmod +x prepare-localized-content.py
          python3 prepare-localized-content.py es
      - name: Build Spanish Documentation
        uses: nunit/docfx-action@v4.1.0
        with:
          args: docfx-es.json
      - name: Prepare Chinese Content (English fallback)
        run: python3 prepare-localized-content.py zh
      - name: Build Chinese Documentation
        uses: nunit/docfx-action@v4.1.0
        with:
          args: docfx-zh.json
      - name: Copy API docs to localized sites
        run: |
          cp -r _site/en/api _site/es/api
          cp -r _site/en/api _site/zh/api
        shell: bash
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUD_081AFFE03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/_site" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "/_site" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_MUD_081AFFE03 }}
          action: "close"
