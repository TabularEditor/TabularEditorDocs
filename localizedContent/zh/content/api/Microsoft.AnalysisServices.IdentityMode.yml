- uid: Microsoft.AnalysisServices.IdentityMode.Default
  commentId: F:Microsoft.AnalysisServices.IdentityMode.Default
  id: Default
  parent: Microsoft.AnalysisServices.IdentityMode
  langs:
  - csharp
  - vb
  name: Default
  nameWithType: IdentityMode.Default
  fullName: Microsoft.AnalysisServices.IdentityMode.Default
  type: Field
  assemblies:
  - TOMWrapper
  namespace: Microsoft.AnalysisServices
  summary: Use the default behavior which is the current-user; in the connection-string means use the global configuration on the client
  example: []
  syntax:
    content: Default = 0
    return:
      type: Microsoft.AnalysisServices.IdentityMode
- uid: Microsoft.AnalysisServices.IdentityMode.CurrentUser
  commentId: F:Microsoft.AnalysisServices.IdentityMode.CurrentUser
  id: CurrentUser
  parent: Microsoft.AnalysisServices.IdentityMode
  langs:
  - csharp
  - vb
  name: CurrentUser
  nameWithType: IdentityMode.CurrentUser
  fullName: Microsoft.AnalysisServices.IdentityMode.CurrentUser
  type: Field
  assemblies:
  - TOMWrapper
  namespace: Microsoft.AnalysisServices
  summary: Identity is resolved to the current user of the OS session
  example: []
  syntax:
    content: CurrentUser = 1
    return:
      type: Microsoft.AnalysisServices.IdentityMode
- uid: Microsoft.AnalysisServices.IdentityMode.Connection
  commentId: F:Microsoft.AnalysisServices.IdentityMode.Connection
  id: Connection
  parent: Microsoft.AnalysisServices.IdentityMode
  langs:
  - csharp
  - vb
  name: Connection
  nameWithType: IdentityMode.Connection
  fullName: Microsoft.AnalysisServices.IdentityMode.Connection
  type: Field
  assemblies:
  - TOMWrapper
  namespace: Microsoft.AnalysisServices
  summary: >-
    Identity is managed based on the target data-source; in the first time a connection is opened to a particular data-source, 

    we launch the login window, so the user can select the identity, any additional connection to a data-source that has the

    associated identity already resolved, we use the first one (that was obtained interactively).
  example: []
  syntax:
    content: Connection = 2
    return:
      type: Microsoft.AnalysisServices.IdentityMode
- uid: Microsoft.AnalysisServices.IdentityMode.Process
  commentId: F:Microsoft.AnalysisServices.IdentityMode.Process
  id: Process
  parent: Microsoft.AnalysisServices.IdentityMode
  langs:
  - csharp
  - vb
  name: Process
  nameWithType: IdentityMode.Process
  fullName: Microsoft.AnalysisServices.IdentityMode.Process
  type: Field
  assemblies:
  - TOMWrapper
  namespace: Microsoft.AnalysisServices
  summary: >-
    Identity is managed for the lifetime of the process; the first connection will trigger an interactive login window,

    so the user can select the identity, any additional connection will use the first identity.
  example: []
  syntax:
    content: Process = 3
    return:
      type: Microsoft.AnalysisServices.IdentityMode
