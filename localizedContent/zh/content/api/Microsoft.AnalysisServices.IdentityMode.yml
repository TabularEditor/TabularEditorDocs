  name: IdentityMode
  nameWithType: IdentityMode
  fullName: Microsoft.AnalysisServices.IdentityMode
  type: Enum
  assemblies:
  - TOMWrapper
  namespace: Microsoft.AnalysisServices
  summary: Controls the resolution of user identity when not explicitly specified in the connection string.
  example: []
  syntax:
    content: public enum IdentityMode
    content.vb: Public Enum IdentityMode
  extensionMethods:
  - Microsoft.AnalysisServices.IdentityMode.TabularEditor.EnumExtensions.AllFlagsChanged``1(Microsoft.AnalysisServices.IdentityMode,Microsoft.AnalysisServices.IdentityMode)
  - Microsoft.AnalysisServices.IdentityMode.TabularEditor.EnumExtensions.AnyFlagsChanged``1(Microsoft.AnalysisServices.IdentityMode,Microsoft.AnalysisServices.IdentityMode)
