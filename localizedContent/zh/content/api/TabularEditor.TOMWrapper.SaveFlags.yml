items:
- uid: TabularEditor.TOMWrapper.SaveFlags
  commentId: T:TabularEditor.TOMWrapper.SaveFlags
  id: SaveFlags
  parent: TabularEditor.TOMWrapper
  children:
  - TabularEditor.TOMWrapper.SaveFlags.Default
  - TabularEditor.TOMWrapper.SaveFlags.DelayValidation
  - TabularEditor.TOMWrapper.SaveFlags.ForceValidation
  langs:
  - csharp
  - vb
  name: SaveFlags
  nameWithType: SaveFlags
  fullName: TabularEditor.TOMWrapper.SaveFlags
  type: Enum
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Advanced options that can be used to control the behavior of a SaveChanges operation.
  example: []
  syntax:
    content: public enum SaveFlags
    content.vb: Public Enum SaveFlags
  extensionMethods:
  - TabularEditor.TOMWrapper.SaveFlags.TabularEditor.EnumExtensions.AllFlagsChanged``1(TabularEditor.TOMWrapper.SaveFlags,TabularEditor.TOMWrapper.SaveFlags)
  - TabularEditor.TOMWrapper.SaveFlags.TabularEditor.EnumExtensions.AnyFlagsChanged``1(TabularEditor.TOMWrapper.SaveFlags,TabularEditor.TOMWrapper.SaveFlags)
