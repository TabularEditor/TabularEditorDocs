- uid: TabularEditor.TOMWrapper.SaveFlags.Default
  commentId: F:TabularEditor.TOMWrapper.SaveFlags.Default
  id: Default
  parent: TabularEditor.TOMWrapper.SaveFlags
  langs:
  - csharp
  - vb
  name: Default
  nameWithType: SaveFlags.Default
  fullName: TabularEditor.TOMWrapper.SaveFlags.Default
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Default SaveChanges behavior.
  remarks: All the pending model changes are packed in a batch containing Create/Alter/Delete/Rename/Process commands together with a SequencePoint command, that trigger immediate validation on the Server if used inside transaction, and sent to the Server.
  example: []
  syntax:
    content: Default = 0
    return:
      type: TabularEditor.TOMWrapper.SaveFlags
- uid: TabularEditor.TOMWrapper.SaveFlags.DelayValidation
  commentId: F:TabularEditor.TOMWrapper.SaveFlags.DelayValidation
  id: DelayValidation
  parent: TabularEditor.TOMWrapper.SaveFlags
  langs:
  - csharp
  - vb
  name: DelayValidation
  nameWithType: SaveFlags.DelayValidation
  fullName: TabularEditor.TOMWrapper.SaveFlags.DelayValidation
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Delay the validation in the SaveChanges.
  remarks: <p>All the pending model changes are packed in a batch containing Create/Alter/Delete/Rename/Process commands and sent to the Server, but no SequencePoint command is sent, which will delay the validation of changes on the Server.</p><p>This flag can only be used inside a transaction, as any operation outside a transaction will cause implicit transaction to be created and committed on Server, which will trigger the validation anyway.</p>
  example: []
  syntax:
    content: DelayValidation = 1
    return:
      type: TabularEditor.TOMWrapper.SaveFlags
- uid: TabularEditor.TOMWrapper.SaveFlags.ForceValidation
  commentId: F:TabularEditor.TOMWrapper.SaveFlags.ForceValidation
  id: ForceValidation
  parent: TabularEditor.TOMWrapper.SaveFlags
  langs:
  - csharp
  - vb
  name: ForceValidation
  nameWithType: SaveFlags.ForceValidation
  fullName: TabularEditor.TOMWrapper.SaveFlags.ForceValidation
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Force the validation in the SaveChanges.
  remarks: <p>Forcing a validation of any changes that were already saved to the server, but are still pending to be commited, by sending SequencePoint command. If the model has any pending local changes, they will be also sent along with SequencePoint command.</p><p>This flag can only be used inside a transaction, as any operation outside a transaction will cause implicit transaction to be created and committed on Server, which will trigger the validation anyway.</p>
  example: []
  syntax:
    content: ForceValidation = 2
    return:
      type: TabularEditor.TOMWrapper.SaveFlags
