- uid: TabularEditor.TOMWrapper.RefreshType.Full
  commentId: F:TabularEditor.TOMWrapper.RefreshType.Full
  id: Full
  parent: TabularEditor.TOMWrapper.RefreshType
  langs:
  - csharp
  - vb
  name: Full
  nameWithType: RefreshType.Full
  fullName: TabularEditor.TOMWrapper.RefreshType.Full
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: For all partitions in the specified partition, table, or database, refresh data and recalculate all dependents. For a calculation partition, recalculate the partition and all its dependents.
  example: []
  syntax:
    content: Full = 1
    return:
      type: TabularEditor.TOMWrapper.RefreshType
