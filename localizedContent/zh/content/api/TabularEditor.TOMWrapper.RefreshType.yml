  namespace: TabularEditor.TOMWrapper
  summary: Clear values in this object and all its dependents.
  example: []
  syntax:
    content: ClearValues = 2
    return:
      type: TabularEditor.TOMWrapper.RefreshType
- uid: TabularEditor.TOMWrapper.RefreshType.Calculate
  commentId: F:TabularEditor.TOMWrapper.RefreshType.Calculate
  id: Calculate
  parent: TabularEditor.TOMWrapper.RefreshType
  langs:
  - csharp
  - vb
  name: Calculate
  nameWithType: RefreshType.Calculate
  fullName: TabularEditor.TOMWrapper.RefreshType.Calculate
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Recalculate this object and all its dependents, but only if needed. This value does not force recalculation, except for volatile formulas.
  example: []
  syntax:
    content: Calculate = 3
    return:
      type: TabularEditor.TOMWrapper.RefreshType
- uid: TabularEditor.TOMWrapper.RefreshType.DataOnly
  commentId: F:TabularEditor.TOMWrapper.RefreshType.DataOnly
  id: DataOnly
  parent: TabularEditor.TOMWrapper.RefreshType
  langs:
  - csharp
  - vb
  name: DataOnly
  nameWithType: RefreshType.DataOnly
  fullName: TabularEditor.TOMWrapper.RefreshType.DataOnly
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Refresh data in this object and clear all dependents.
  example: []
  syntax:
    content: DataOnly = 4
    return:
      type: TabularEditor.TOMWrapper.RefreshType
- uid: TabularEditor.TOMWrapper.RefreshType.Automatic
  commentId: F:TabularEditor.TOMWrapper.RefreshType.Automatic
  id: Automatic
  parent: TabularEditor.TOMWrapper.RefreshType
  langs:
  - csharp
  - vb
  name: Automatic
  nameWithType: RefreshType.Automatic
  fullName: TabularEditor.TOMWrapper.RefreshType.Automatic
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: If the object needs to be refreshed and recalculated, refresh and recalculate the object and all its dependents. Applies if the partition is in a state other than Ready.
  example: []
  syntax:
    content: Automatic = 5
    return:
      type: TabularEditor.TOMWrapper.RefreshType
- uid: TabularEditor.TOMWrapper.RefreshType.Add
  commentId: F:TabularEditor.TOMWrapper.RefreshType.Add
  id: Add
  parent: TabularEditor.TOMWrapper.RefreshType
  langs:
  - csharp
  - vb
  name: Add
  nameWithType: RefreshType.Add
  fullName: TabularEditor.TOMWrapper.RefreshType.Add
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Append data to this partition and recalculate all dependents. This command is valid only for regular partitions and not for calculation partitions.
  example: []
  syntax:
    content: Add = 7
    return:
      type: TabularEditor.TOMWrapper.RefreshType
- uid: TabularEditor.TOMWrapper.RefreshType.Defragment
  commentId: F:TabularEditor.TOMWrapper.RefreshType.Defragment
  id: Defragment
  parent: TabularEditor.TOMWrapper.RefreshType
  langs:
  - csharp
  - vb
  name: Defragment
  nameWithType: RefreshType.Defragment
  fullName: TabularEditor.TOMWrapper.RefreshType.Defragment
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Defragment the data in the specified table. As data is added to or removed from a table, the dictionaries of each column can become polluted with values that no longer exist in the actual column values. The defragment option will clean up the values in the dictionaries that are no longer used.
  example: []
  syntax:
    content: Defragment = 8
    return:
      type: TabularEditor.TOMWrapper.RefreshType
