  summary: Represent as an unenforceable instruction (a hint) to bind a data source reference in the model to a data connection in Fabric. The hint is ignored if the data source is already bound or if the data connection does not exist in Fabric.
  remarks: This metadata object is only supported when the compatibility level of the database is at 1608 or above.
