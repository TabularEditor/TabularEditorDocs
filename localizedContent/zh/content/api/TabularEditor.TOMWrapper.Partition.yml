- uid: TabularEditor.TOMWrapper.Partition.State
  commentId: P:TabularEditor.TOMWrapper.Partition.State
  id: State
  parent: TabularEditor.TOMWrapper.Partition
  langs:
  - csharp
  - vb
  name: State
  nameWithType: Partition.State
  fullName: TabularEditor.TOMWrapper.Partition.State
  type: Property
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: 'Provides information on the state of the partition. Possible values are as follows. Ready (1): The partition is queryable and has up-to-date data. NoData (3): The partition is queryable but has no data. This state applies only to partitions with a type other than Calculated. CalculationNeeded (4): The partition is not queryable and needs to be refreshed (that is, recalculated) to become functional. This state applies only to partitions of the type Calculated. SemanticError (5): The partition is in an error state because of an invalid expression and is not queryable. This state applies only to partitions of the type Calculated. EvaluationError (6): The partition is in an error state because of an error during expression evaluation. The partition is not queryable. This state applies only to partitions of the type Calculated. DependencyError (7): The partition is in an error state because some of its calculation dependencies are in an error state. The partition is not queryable. This state applies only to partitions of the type Calculated. Incomplete (8): Some parts of the partition have no data, and the partition needs to be refreshed to bring the data in. The partition is queryable. This state applies only to partitions of a type other than Calculated. SyntaxError (9): The partition is in an error state because of a syntax error in its expression. The partition is not queryable. This state applies only to partitions of the type Calculated.'
  example: []
  syntax:
    content: public ObjectState State { get; }
    parameters: []
    return:
      type: TabularEditor.TOMWrapper.ObjectState
    content.vb: Public ReadOnly Property State As ObjectState
  overload: TabularEditor.TOMWrapper.Partition.State*
- uid: TabularEditor.TOMWrapper.Partition.Mode
