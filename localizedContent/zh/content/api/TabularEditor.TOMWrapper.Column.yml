- uid: TabularEditor.TOMWrapper.Column.State
  commentId: P:TabularEditor.TOMWrapper.Column.State
  id: State
  parent: TabularEditor.TOMWrapper.Column
  langs:
  - csharp
  - vb
  name: State
  nameWithType: Column.State
  fullName: TabularEditor.TOMWrapper.Column.State
  type: Property
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Enumerates the state of the column. Possible values include the following. Ready (1) The column is queryable and has up-to-date data. NoData (3) The column is queryable but has no data. This state is applicable only to columns of the type Data. CalculationNeeded (4) The column is not queryable and needs to be refreshed (that is, recalculated) to become functional. This state applies only to columns of the type Calculated or CalculatedTableColumn. SemanticError (5) The column is in an error state because of an invalid expression. The column is not queryable. This state applies only to columns of the type Calculated or CalculatedTableColumn. EvaluationError (6) The column is in an error state because of an error during expression evaluation. The column is not queryable.  This state applies only to columns of the type Calculated or CalculatedTableColumn. DependencyError (7) The column is in an error state because some of its calculation dependencies are in an error state.  The column is not queryable. This state applies only to columns of the type Calculated or CalculatedTableColumn. Incomplete (8) Some parts of the column have no data, and the column needs to be refreshed to bring the data in. The column is queryable. This state applies only to columns of the type Data. SyntaxError (9) The column is in an error state because of a syntax error in its expression. The column is not queryable. This state applies only to columns of the type Calculated.
  example: []
  syntax:
    content: public ObjectState State { get; }
    parameters: []
    return:
      type: TabularEditor.TOMWrapper.ObjectState
    content.vb: Public ReadOnly Property State As ObjectState
  overload: TabularEditor.TOMWrapper.Column.State*
