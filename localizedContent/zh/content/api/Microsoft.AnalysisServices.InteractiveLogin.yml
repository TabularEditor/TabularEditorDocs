  name: Default
  nameWithType: InteractiveLogin.Default
  fullName: Microsoft.AnalysisServices.InteractiveLogin.Default
  type: Field
  assemblies:
  - TOMWrapper
  namespace: Microsoft.AnalysisServices
  summary: >-
    Behavior is controlled based on the system's default behavior and other properties in the connection-string;

    usually that means using SSO first and only launching the login window if the silent authentication fails.
  example: []
  syntax:
    content: Default = 0
    return:
      type: Microsoft.AnalysisServices.InteractiveLogin
