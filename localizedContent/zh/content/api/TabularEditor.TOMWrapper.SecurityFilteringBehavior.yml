  name: SecurityFilteringBehavior
  nameWithType: SecurityFilteringBehavior
  fullName: TabularEditor.TOMWrapper.SecurityFilteringBehavior
  type: Enum
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Indicates how relationships influence filtering of data when evaluating row-level security expressions. The enumeration defines the possible behaviors.
  example: []
  syntax:
    content: public enum SecurityFilteringBehavior
    content.vb: Public Enum SecurityFilteringBehavior
  extensionMethods:
