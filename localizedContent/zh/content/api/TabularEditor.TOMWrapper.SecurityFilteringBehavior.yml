- uid: TabularEditor.TOMWrapper.SecurityFilteringBehavior.OneDirection
  commentId: F:TabularEditor.TOMWrapper.SecurityFilteringBehavior.OneDirection
  id: OneDirection
  parent: TabularEditor.TOMWrapper.SecurityFilteringBehavior
  langs:
  - csharp
  - vb
  name: OneDirection
  nameWithType: SecurityFilteringBehavior.OneDirection
  fullName: TabularEditor.TOMWrapper.SecurityFilteringBehavior.OneDirection
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: The rows selected in the 'To' end of the relationship will automatically filter scans of the table in the 'From' end of the relationship.
  example: []
  syntax:
    content: OneDirection = 1
    return:
      type: TabularEditor.TOMWrapper.SecurityFilteringBehavior
- uid: TabularEditor.TOMWrapper.SecurityFilteringBehavior.BothDirections
  commentId: F:TabularEditor.TOMWrapper.SecurityFilteringBehavior.BothDirections
  id: BothDirections
  parent: TabularEditor.TOMWrapper.SecurityFilteringBehavior
  langs:
  - csharp
  - vb
  name: BothDirections
  nameWithType: SecurityFilteringBehavior.BothDirections
  fullName: TabularEditor.TOMWrapper.SecurityFilteringBehavior.BothDirections
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Filters on either end of the relationship will automatically filter the other table.
  example: []
  syntax:
    content: BothDirections = 2
    return:
      type: TabularEditor.TOMWrapper.SecurityFilteringBehavior
- uid: TabularEditor.TOMWrapper.SecurityFilteringBehavior.None
  commentId: F:TabularEditor.TOMWrapper.SecurityFilteringBehavior.None
  id: None
  parent: TabularEditor.TOMWrapper.SecurityFilteringBehavior
  langs:
  - csharp
  - vb
  name: None
  nameWithType: SecurityFilteringBehavior.None
  fullName: TabularEditor.TOMWrapper.SecurityFilteringBehavior.None
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Blocks RLS filter propagation from the One side to the Many side of a table relationship. This only applies to limited relationships in which at least one table is from a Power BI semantic model or Analysis Services database and the other table is from a different data source.
  remarks: This value is only supported when the compatibility level of the database is at 1561 or above.
  example: []
  syntax:
    content: None = 3
    return:
      type: TabularEditor.TOMWrapper.SecurityFilteringBehavior
