- uid: TabularEditor.TOMWrapper.DatasourceIsolation.ReadCommitted
  commentId: F:TabularEditor.TOMWrapper.DatasourceIsolation.ReadCommitted
  id: ReadCommitted
  parent: TabularEditor.TOMWrapper.DatasourceIsolation
  langs:
  - csharp
  - vb
  name: ReadCommitted
  nameWithType: DatasourceIsolation.ReadCommitted
  fullName: TabularEditor.TOMWrapper.DatasourceIsolation.ReadCommitted
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Specifies that statements cannot read data that has been modified, but not committed, by other transactions. This prevents dirty reads.
  example: []
  syntax:
    content: ReadCommitted = 1
    return:
      type: TabularEditor.TOMWrapper.DatasourceIsolation
- uid: TabularEditor.TOMWrapper.DatasourceIsolation.Snapshot
  commentId: F:TabularEditor.TOMWrapper.DatasourceIsolation.Snapshot
  id: Snapshot
  parent: TabularEditor.TOMWrapper.DatasourceIsolation
  langs:
  - csharp
  - vb
  name: Snapshot
  nameWithType: DatasourceIsolation.Snapshot
  fullName: TabularEditor.TOMWrapper.DatasourceIsolation.Snapshot
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Specifies that the data read by any statement in a transaction is transactionally consistent, as if the statements in a transaction receive a snapshot of the committed data as it existed at the start of the transaction.
  example: []
  syntax:
    content: Snapshot = 2
    return:
      type: TabularEditor.TOMWrapper.DatasourceIsolation
