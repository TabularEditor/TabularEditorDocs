items:
- uid: TabularEditor.SemanticBridge.SemanticBridgeService
  commentId: T:TabularEditor.SemanticBridge.SemanticBridgeService
  id: SemanticBridgeService
  parent: TabularEditor.SemanticBridge
  children:
  - TabularEditor.SemanticBridge.SemanticBridgeService.MetricView
  langs:
  - csharp
  - vb
  name: SemanticBridgeService
  nameWithType: SemanticBridgeService
  fullName: TabularEditor.SemanticBridge.SemanticBridgeService
  type: Class
  assemblies:
  - SemanticBridge
  namespace: TabularEditor.SemanticBridge
  summary: Main entry point for cross-platform semantic model operations.
  remarks: >-
    <p>
        <b>Access Pattern:</b> This service is accessed via <code>ScriptHost.SemanticBridge</code> in C# scripts.
        It is initialized once during application startup in the main routine
        and remains constant for the application lifetime.
    </p>

    <p>
        <b>Lifecycle:</b> Unlike <code>ScriptHost.Model</code> and <code>ScriptHost.Selected</code>, which are set per
        script execution, SemanticBridge is an application-level singleton service. This allows service state
        (such as the currently loaded MetricView) to persist across multiple script executions.
    </p>

    <p>
        <b>Feature Flag:</b> Requires the SemanticBridge feature flag to be enabled for the current license tier.
        Construction will fail with <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref> if the feature is not enabled.
    </p>
  example:
  - >-
    Load and validate a MetricView in a C# script:


    <pre><code class="lang-csharp">SemanticBridge.MetricView.Load(@"C:\path\to\metricview.yaml");

    var diagnostics = SemanticBridge.MetricView.Validate();

    foreach (var diag in diagnostics)

    {
        Output($"{diag.Severity}: {diag.Message}");
    }</code></pre>


    Import a MetricView into the current Tabular model:


    <pre><code class="lang-csharp">SemanticBridge.MetricView.Load(@"C:\path\to\metricview.yaml");

    var success = SemanticBridge.MetricView.ImportToTabular(
        Model,
        "databricks-host.cloud.databricks.com",
        "/sql/1.0/warehouses/abc123",
        out var diagnostics);
    if (!success)

    {
        foreach (var error in diagnostics)
            Error($"Import failed: {error.Message}");
    }</code></pre>
  syntax:
    content: public class SemanticBridgeService
    content.vb: Public Class SemanticBridgeService
