  fullName: TabularEditor.SemanticBridge.SemanticBridgeService.MetricView
  type: Property
  assemblies:
  - SemanticBridge
  namespace: TabularEditor.SemanticBridge
  summary: Gets the Databricks MetricView operations and state management service.
  remarks: >-
    This service manages a single MetricView instance at a time. Loading a new MetricView

    replaces the current view. The view state persists across multiple script executions.
  example: []
  syntax:
    content: public DatabricksMetricViewService MetricView { get; }
    parameters: []
    return:
      type: TabularEditor.SemanticBridge.Platforms.Databricks.DatabricksMetricViewService
    content.vb: Public ReadOnly Property MetricView As DatabricksMetricViewService
