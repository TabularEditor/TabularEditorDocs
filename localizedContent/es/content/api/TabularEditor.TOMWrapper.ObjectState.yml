  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Object is in an error state because an error occurred during expression evaluation. It is not queryable.
  example: []
  syntax:
    content: EvaluationError = 6
    return:
      type: TabularEditor.TOMWrapper.ObjectState
- uid: TabularEditor.TOMWrapper.ObjectState.DependencyError
  commentId: F:TabularEditor.TOMWrapper.ObjectState.DependencyError
  id: DependencyError
  parent: TabularEditor.TOMWrapper.ObjectState
  langs:
  - csharp
  - vb
  name: DependencyError
  nameWithType: ObjectState.DependencyError
  fullName: TabularEditor.TOMWrapper.ObjectState.DependencyError
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Object is in an error state because some of its calculation dependencies are in an error state. It is not queryable.
  example: []
  syntax:
    content: DependencyError = 7
    return:
      type: TabularEditor.TOMWrapper.ObjectState
- uid: TabularEditor.TOMWrapper.ObjectState.Incomplete
  commentId: F:TabularEditor.TOMWrapper.ObjectState.Incomplete
  id: Incomplete
  parent: TabularEditor.TOMWrapper.ObjectState
  langs:
  - csharp
  - vb
  name: Incomplete
  nameWithType: ObjectState.Incomplete
  fullName: TabularEditor.TOMWrapper.ObjectState.Incomplete
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Some parts of the object have no data. Refresh the object to add the rest of the data. The object is queryable. Applies to non-calculated objects, such as DataColumns, partitions, and tables.
  example: []
  syntax:
    content: Incomplete = 8
    return:
      type: TabularEditor.TOMWrapper.ObjectState
- uid: TabularEditor.TOMWrapper.ObjectState.ForceCalculationNeeded
  commentId: F:TabularEditor.TOMWrapper.ObjectState.ForceCalculationNeeded
  id: ForceCalculationNeeded
  parent: TabularEditor.TOMWrapper.ObjectState
  langs:
  - csharp
  - vb
  name: ForceCalculationNeeded
  nameWithType: ObjectState.ForceCalculationNeeded
  fullName: TabularEditor.TOMWrapper.ObjectState.ForceCalculationNeeded
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: The data is possibly outdated, but is in a queryable state. Applies only for CalculatedTable.
  remarks: This value is only supported at database compatibility level of 1400 or above for Pbi server.
  example: []
  syntax:
    content: ForceCalculationNeeded = 10
    return:
      type: TabularEditor.TOMWrapper.ObjectState
