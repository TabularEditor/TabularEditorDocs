  name: SemanticError
  nameWithType: ObjectState.SemanticError
  fullName: TabularEditor.TOMWrapper.ObjectState.SemanticError
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Object is in an error state because of an invalid expression. It is not queryable.
  example: []
  syntax:
    content: SemanticError = 5
    return:
      type: TabularEditor.TOMWrapper.ObjectState
- uid: TabularEditor.TOMWrapper.ObjectState.EvaluationError
  commentId: F:TabularEditor.TOMWrapper.ObjectState.EvaluationError
