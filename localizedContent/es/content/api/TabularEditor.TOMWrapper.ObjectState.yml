- uid: TabularEditor.TOMWrapper.ObjectState.NoData
  commentId: F:TabularEditor.TOMWrapper.ObjectState.NoData
  id: NoData
  parent: TabularEditor.TOMWrapper.ObjectState
  langs:
  - csharp
  - vb
  name: NoData
  nameWithType: ObjectState.NoData
  fullName: TabularEditor.TOMWrapper.ObjectState.NoData
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Object is queryable but contains no data. Refresh it to bring in data. Applies to non-calculated objects, such as DataColumns, partitions, and Tables.
  example: []
  syntax:
    content: NoData = 3
    return:
      type: TabularEditor.TOMWrapper.ObjectState
- uid: TabularEditor.TOMWrapper.ObjectState.CalculationNeeded
  commentId: F:TabularEditor.TOMWrapper.ObjectState.CalculationNeeded
  id: CalculationNeeded
  parent: TabularEditor.TOMWrapper.ObjectState
  langs:
  - csharp
  - vb
  name: CalculationNeeded
  nameWithType: ObjectState.CalculationNeeded
  fullName: TabularEditor.TOMWrapper.ObjectState.CalculationNeeded
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Object is not queryable and contains no data. It needs to be refreshed to become functional. Applies only to calculated objects, such as calculated columns, hierarchies, and calculated tables.
  example: []
  syntax:
    content: CalculationNeeded = 4
    return:
      type: TabularEditor.TOMWrapper.ObjectState
- uid: TabularEditor.TOMWrapper.ObjectState.SemanticError
  commentId: F:TabularEditor.TOMWrapper.ObjectState.SemanticError
