  namespace: TabularEditor.TOMWrapper
  summary: Represents a Table in the data model. A Table object is a member of the <xref href="TabularEditor.TOMWrapper.TableCollection" data-throw-if-not-resolved="false"></xref> object under a <xref href="TabularEditor.TOMWrapper.Model" data-throw-if-not-resolved="false"></xref> object. It contains a <xref href="TabularEditor.TOMWrapper.ColumnCollection" data-throw-if-not-resolved="false"></xref>. Rows are based on <xref href="TabularEditor.TOMWrapper.Partition" data-throw-if-not-resolved="false"></xref> object or a <xref href="TabularEditor.TOMWrapper.CalculatedPartitionSource" data-throw-if-not-resolved="false"></xref> if the Table is a calculated table.
