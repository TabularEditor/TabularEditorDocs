- uid: TabularEditor.Shared.Scripting.ScriptHost.Model
  commentId: P:TabularEditor.Shared.Scripting.ScriptHost.Model
  id: Model
  parent: TabularEditor.Shared.Scripting.ScriptHost
  langs:
  - csharp
  - vb
  name: Model
  nameWithType: ScriptHost.Model
  fullName: TabularEditor.Shared.Scripting.ScriptHost.Model
  type: Property
  assemblies:
  - TabularEditor3.Shared
  namespace: TabularEditor.Shared.Scripting
  summary: The currently loaded <xref href="TabularEditor.TOMWrapper.Model" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    When no model is loaded in Tabular Editor, this property will be null causing calls to global methods such as <xref href="TabularEditor.Shared.Scripting.ScriptHost.EvaluateDax(System.String)" data-throw-if-not-resolved="false"></xref>, <xref href="TabularEditor.Shared.Scripting.ScriptHost.SelectMeasure(TabularEditor.TOMWrapper.Measure%2cSystem.String)" data-throw-if-not-resolved="false"></xref>, etc. to fail.

    If you want to run a script without loading a model in Tabular Editor, or if you want the script to apply its changes to a different model than the one currently loaded, you may explicitly assign a model to this property as shown below:
  example:
  - >-
    var modelHandler = new TabularModelHandler("localhost", "AdventureWorks"); // Connects to the 'AdventureWorks' database from the 'localhost' AS instance

    Model = modelHandler.Model; // Specify that the script should use the model loaded above

    var myMeasure = SelectMeasure(); // Prompt the user to select a measure from the model.
  syntax:
    content: public static Model Model { get; set; }
    parameters: []
    return:
      type: TabularEditor.TOMWrapper.Model
    content.vb: Public Shared Property Model As Model
  overload: TabularEditor.Shared.Scripting.ScriptHost.Model*
