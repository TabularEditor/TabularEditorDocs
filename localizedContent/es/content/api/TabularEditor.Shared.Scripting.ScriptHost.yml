- uid: TabularEditor.Shared.Scripting.ScriptHost.SemanticBridge
  commentId: P:TabularEditor.Shared.Scripting.ScriptHost.SemanticBridge
  id: SemanticBridge
  parent: TabularEditor.Shared.Scripting.ScriptHost
  langs:
  - csharp
  - vb
  name: SemanticBridge
  nameWithType: ScriptHost.SemanticBridge
  fullName: TabularEditor.Shared.Scripting.ScriptHost.SemanticBridge
  type: Property
  assemblies:
  - TabularEditor3.Shared
  namespace: TabularEditor.Shared.Scripting
  summary: SemanticBridge service for cross-platform semantic model operations.
  remarks: >-
    <p>

    <b>State Persistence:</b> The service maintains state (e.g., currently loaded MetricView)

    that persists across multiple script executions, allowing workflows like:


    <pre><code class="lang-csharp">// Script 1: Load and validate

    SemanticBridge.MetricView.Load(@"C:\data.yaml");

    var diag = SemanticBridge.MetricView.Validate();


    // Script 2 (later): Use the same loaded view

    SemanticBridge.MetricView.ImportToTabular(Model, "host", "path", out var diag);</code></pre>

    </p>

    <p>

    <b>Availability:</b> This service requires an appropriate license. If

    the feature is disabled, accessing it will throw a <xref href="TabularEditor.Shared.Scripting.ScriptException" data-throw-if-not-resolved="false"></xref>

    with guidance.

    </p>
  example:
  - >-
    Load and validate a Databricks MetricView:


    <pre><code class="lang-csharp">SemanticBridge.MetricView.Load(@"C:\path\to\metricview.yaml");

    var diagnostics = SemanticBridge.MetricView.Validate();

    foreach (var diag in diagnostics)

    {
        Output($"{diag.Severity}: {diag.Message}");
    }</code></pre>


    Import a MetricView into the current Tabular model:


    <pre><code class="lang-csharp">SemanticBridge.MetricView.Load(@"C:\path\to\metricview.yaml");

    var success = SemanticBridge.MetricView.ImportToTabular(
        Model,
        "databricks-host.cloud.databricks.com",
        "/sql/1.0/warehouses/abc123",
        out var diagnostics);
    if (!success)

    {
        foreach (var error in diagnostics)
            Output($"Import failed: {error.Message}");
    }</code></pre>
  syntax:
    content: public static SemanticBridgeService SemanticBridge { get; }
    parameters: []
    return:
      type: TabularEditor.SemanticBridge.SemanticBridgeService
    content.vb: Public Shared ReadOnly Property SemanticBridge As SemanticBridgeService
  overload: TabularEditor.Shared.Scripting.ScriptHost.SemanticBridge*
  exceptions:
  - type: TabularEditor.Shared.Scripting.ScriptException
    commentId: T:TabularEditor.Shared.Scripting.ScriptException
    description: Thrown when the SemanticBridge service is not available (feature not enabled for license tier)
  seealso:
  - linkId: TabularEditor.SemanticBridge.SemanticBridgeService
    commentId: T:TabularEditor.SemanticBridge.SemanticBridgeService
  - linkId: TabularEditor.SemanticBridge.Platforms.Databricks.DatabricksMetricViewService
    commentId: T:TabularEditor.SemanticBridge.Platforms.Databricks.DatabricksMetricViewService
