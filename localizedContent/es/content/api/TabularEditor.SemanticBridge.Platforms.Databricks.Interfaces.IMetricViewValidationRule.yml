  type: Method
  assemblies:
  - SemanticBridge
  namespace: TabularEditor.SemanticBridge.Platforms.Databricks.Interfaces
  summary: >-
    Validates the target object using the provided read-only context.

    ValidMetricViewRules receive a read-only view to prevent accidental

    mutation of validation state.
  example: []
  syntax:
    content: IEnumerable<DiagnosticMessage> Validate(IMetricViewObject target, IReadOnlyValidationContext context)
    parameters:
    - id: target
      type: TabularEditor.SemanticBridge.Platforms.Databricks.Interfaces.IMetricViewObject
      description: The object to validate
    - id: context
      type: TabularEditor.SemanticBridge.Platforms.Databricks.Validation.IReadOnlyValidationContext
      description: >-
        Read-only validation context with state information including path tracking

        and uniqueness collections
    return:
      type: System.Collections.Generic.IEnumerable{TabularEditor.SemanticBridge.Orchestration.DiagnosticMessage}
      description: >-
        Collection of diagnostic messages for any validation failures, or an empty

        collection if validation passes
    content.vb: Function Validate(target As IMetricViewObject, context As IReadOnlyValidationContext) As IEnumerable(Of DiagnosticMessage)
