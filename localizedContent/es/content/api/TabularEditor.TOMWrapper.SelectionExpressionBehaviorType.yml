  type: Enum
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Determines Selection Expression behavior for Calculation groups
  remarks: This enum is only supported when the compatibility level of the database is at 1609 or above.
