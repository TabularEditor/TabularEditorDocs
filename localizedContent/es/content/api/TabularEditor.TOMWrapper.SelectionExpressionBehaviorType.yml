- uid: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType.Visual
  commentId: F:TabularEditor.TOMWrapper.SelectionExpressionBehaviorType.Visual
  id: Visual
  parent: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType
  langs:
  - csharp
  - vb
  name: Visual
  nameWithType: SelectionExpressionBehaviorType.Visual
  fullName: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType.Visual
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Subtotals are determined by Selection Expressions when grouping by Calculation Groups. Multi-selection yields BLANK() when the MultipleOrEmptySelectionExpression is undefined.
  example: []
  syntax:
    content: Visual = 1
    return:
      type: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType
- uid: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType.NonVisual
  commentId: F:TabularEditor.TOMWrapper.SelectionExpressionBehaviorType.NonVisual
  id: NonVisual
  parent: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType
  langs:
  - csharp
  - vb
  name: NonVisual
  nameWithType: SelectionExpressionBehaviorType.NonVisual
  fullName: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType.NonVisual
  type: Field
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Subtotals are hidden when grouping by Calculation Groups. Multi-selection yields SELECTEDMEASURE() when the MultipleOrEmptySelectionExpression is undefined.
  example: []
  syntax:
    content: NonVisual = 2
    return:
      type: TabularEditor.TOMWrapper.SelectionExpressionBehaviorType
