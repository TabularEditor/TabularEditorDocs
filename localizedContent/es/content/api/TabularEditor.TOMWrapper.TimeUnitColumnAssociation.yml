- uid: TabularEditor.TOMWrapper.TimeUnitColumnAssociation.CreateNew(TabularEditor.TOMWrapper.Calendar,TabularEditor.TOMWrapper.TimeUnit)
  commentId: M:TabularEditor.TOMWrapper.TimeUnitColumnAssociation.CreateNew(TabularEditor.TOMWrapper.Calendar,TabularEditor.TOMWrapper.TimeUnit)
  id: CreateNew(TabularEditor.TOMWrapper.Calendar,TabularEditor.TOMWrapper.TimeUnit)
  parent: TabularEditor.TOMWrapper.TimeUnitColumnAssociation
  langs:
  - csharp
  - vb
  name: CreateNew(Calendar, TimeUnit)
  nameWithType: TimeUnitColumnAssociation.CreateNew(Calendar, TimeUnit)
  fullName: TabularEditor.TOMWrapper.TimeUnitColumnAssociation.CreateNew(TabularEditor.TOMWrapper.Calendar, TabularEditor.TOMWrapper.TimeUnit)
  type: Method
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: >-
    Creates a new instance of the <xref href="TabularEditor.TOMWrapper.TimeUnitColumnAssociation" data-throw-if-not-resolved="false"></xref> class and associates it with the

    specified calendar.
  remarks: >-
    This method creates a new <xref href="TabularEditor.TOMWrapper.TimeUnitColumnAssociation" data-throw-if-not-resolved="false"></xref> object, initializes
                it, and adds it to the <xref href="TabularEditor.TOMWrapper.Calendar.CalendarColumnGroups" data-throw-if-not-resolved="false"></xref> collection of the specified <code class="paramref">parent</code>.
  example: []
  syntax:
    content: public static TimeUnitColumnAssociation CreateNew(Calendar parent, TimeUnit timeUnit)
    parameters:
    - id: parent
      type: TabularEditor.TOMWrapper.Calendar
      description: >-
        The <xref href="TabularEditor.TOMWrapper.Calendar" data-throw-if-not-resolved="false"></xref> to which the new <xref href="TabularEditor.TOMWrapper.TimeUnitColumnAssociation" data-throw-if-not-resolved="false"></xref> will be added. Cannot be
                    null.
    - id: timeUnit
      type: TabularEditor.TOMWrapper.TimeUnit
      description: The time unit to associate with the new column.
    return:
      type: TabularEditor.TOMWrapper.TimeUnitColumnAssociation
      description: A new <xref href="TabularEditor.TOMWrapper.TimeUnitColumnAssociation" data-throw-if-not-resolved="false"></xref> instance associated with the specified calendar.
    content.vb: Public Shared Function CreateNew(parent As Calendar, timeUnit As TimeUnit) As TimeUnitColumnAssociation
  overload: TabularEditor.TOMWrapper.TimeUnitColumnAssociation.CreateNew*
- uid: TabularEditor.TOMWrapper.TimeUnitColumnAssociation.ToString
  commentId: M:TabularEditor.TOMWrapper.TimeUnitColumnAssociation.ToString
  id: ToString
  parent: TabularEditor.TOMWrapper.TimeUnitColumnAssociation
  langs:
  - csharp
  - vb
  name: ToString()
  nameWithType: TimeUnitColumnAssociation.ToString()
  fullName: TabularEditor.TOMWrapper.TimeUnitColumnAssociation.ToString()
  type: Method
  assemblies:
  - TOMWrapper
  namespace: TabularEditor.TOMWrapper
  summary: Returns a string representation of the object, including the primary column name and time unit.
  remarks: >-
    If the <xref href="TabularEditor.TOMWrapper.TimeUnitColumnAssociation.PrimaryColumn" data-throw-if-not-resolved="false"></xref> is null, the method returns "(Unassigned)".
                Otherwise, it returns the <xref href="TabularEditor.TOMWrapper.IDaxObject.DaxObjectName" data-throw-if-not-resolved="false"></xref> followed by the time unit, formatted
                with camel case splitting.
  example: []
  syntax:
    content: public override string ToString()
    return:
      type: System.String
      description: >-
        A string that represents the object. The format is either "(Unassigned)" if the primary column is null, or
                    "<code>PrimaryColumn.DaxObjectName</code> (<code>TimeUnit</code>)" with the time unit formatted.
    content.vb: Public Overrides Function ToString() As String
  overridden: System.Object.ToString
  overload: TabularEditor.TOMWrapper.TimeUnitColumnAssociation.ToString*
